<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previsão do Tempo Compacta</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="card">
        <div class="weather">
            <div class="search-integrated">
                <input type="text" id="city-input" placeholder="Buscar cidade..." spellcheck="false">
                <button id="search-btn"></button>
            </div>

            <img src="images/clear.png" class="weather-icon" alt="Clima">
            <h1 class="temp">--°C</h1>
            <p class="city-display">--</p> <div class="details">
                <div class="col">
                    <img src="images/humidity.png" alt="Umidade">
                    <div>
                        <p class="humidity">--%</p>
                        <p>Umidade</p>
                    </div>
                </div>
                <div class="col">
                    <img src="images/wind.png" alt="Vento">
                    <div>
                        <p class="wind">-- km/h</p>
                        <p>Vento</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="forecast-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
